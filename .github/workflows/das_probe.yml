name: naikaku-das-zip-probe
on:
  workflow_dispatch:
    inputs:
      iiif_id:
        description: "naikaku IIIF id"
        required: true
        default: "1079184"
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: run probe
        env:
          OUT_DIR: out
        run: python das_zip_probe.py "${{ github.event.inputs.iiif_id }}"
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: das-probe-${{ github.event.inputs.iiif_id }}
          path: out/**
          if-no-files-found: warn
